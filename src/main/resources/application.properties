spring.application.name=schoolManagement
# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/schoolManagement
spring.datasource.username=deekshith
spring.datasource.password=@Hello1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=non_null
# ── JWT ──────────────────────────────────────────────────────
jwt.secret=SchoolMgmtSecretKey2024ForJWTSigningMustBe256BitsLong!
jwt.expiration=86400000
